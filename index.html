<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스마트 소비 상품관</title>
  <style>
    :root {
      --bg: #f7fbfd;
      --surface: #ffffff;
      --surface-2: #f4f7fc;
      --text: #111827;
      --muted: #6b7280;
      --line: #e6edf4;
      --primary: #69bec8;
      --primary-dark: #348a96;
      --primary-soft: #e8f8fa;
      --blue: #2946a3;
      --yellow: #f7c948;
      --danger: #ff6b6b;
      --shadow: 0 18px 48px rgba(17, 24, 39, 0.08);
      --card-shadow: 0 12px 30px rgba(17, 24, 39, 0.06);
      --radius-xl: 30px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --max: 1180px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 0%, rgba(105, 190, 200, 0.15), transparent 30%),
        radial-gradient(circle at 90% 12%, rgba(41, 70, 163, 0.08), transparent 25%),
        var(--bg);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      width: min(100%, var(--max));
      margin: 0 auto;
      padding: 26px 18px 60px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(230, 237, 244, 0.9);
      border-radius: 36px;
      padding: 28px 24px 34px;
      text-align: center;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      pointer-events: none;
    }

    .hero::before {
      width: 180px;
      height: 180px;
      background: rgba(105, 190, 200, 0.13);
      left: -70px;
      top: -70px;
    }

    .hero::after {
      width: 230px;
      height: 230px;
      background: rgba(41, 70, 163, 0.07);
      right: -90px;
      bottom: -90px;
    }

    .hero-inner {
      position: relative;
      z-index: 1;
    }

    .mascot {
      width: 142px;
      height: 106px;
      margin: 0 auto 8px;
      display: block;
      filter: drop-shadow(0 8px 18px rgba(41, 70, 163, 0.08));
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 8px;
      padding: 8px 14px;
      color: var(--primary-dark);
      font-weight: 800;
      background: var(--primary-soft);
      border: 1px solid #cfedf1;
      border-radius: 999px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.1rem, 5.5vw, 4.5rem);
      letter-spacing: -0.075em;
      line-height: 1.02;
      color: #101828;
    }

    .subtitle {
      margin: 16px auto 24px;
      max-width: 760px;
      color: #6a7282;
      font-size: clamp(1rem, 2.5vw, 1.28rem);
      line-height: 1.6;
      font-weight: 700;
    }

    .subtitle strong {
      color: var(--primary-dark);
    }

    .search-wrap {
      width: min(100%, 900px);
      margin: 0 auto;
      padding: 7px;
      border-radius: 24px;
      background: rgba(105, 190, 200, 0.12);
      box-shadow: 0 10px 0 rgba(105, 190, 200, 0.05);
    }

    .search-field {
      width: 100%;
      height: 70px;
      border: 3px solid var(--primary);
      outline: none;
      border-radius: 20px;
      padding: 0 24px;
      font-size: clamp(1.05rem, 3vw, 1.45rem);
      font-weight: 800;
      color: #0f172a;
      background: #ffffff;
      transition: box-shadow 180ms ease, transform 180ms ease;
    }

    .search-field::placeholder {
      color: #9ba6b8;
    }

    .search-field:focus {
      box-shadow: 0 0 0 6px rgba(105, 190, 200, 0.16);
      transform: translateY(-1px);
    }

    .mode-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 18px;
    }

    .mode-label {
      color: #667085;
      font-weight: 900;
      margin-right: 2px;
    }

    .mode-button {
      border: 1px solid #d7e4ee;
      background: #fff;
      color: #526071;
      border-radius: 999px;
      padding: 11px 14px;
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(17, 24, 39, 0.04);
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, color 160ms ease;
    }

    .mode-button:hover {
      transform: translateY(-2px);
      border-color: #aacfd5;
    }

    .mode-button.is-active {
      color: #123842;
      background: var(--primary-soft);
      border-color: var(--primary);
      box-shadow: 0 10px 24px rgba(105, 190, 200, 0.18);
    }

    .toolbar {
      margin: 36px 4px 16px;
      display: flex;
      flex-wrap: wrap;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
    }

    .section-title {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: baseline;
    }

    .section-title h2 {
      margin: 0;
      font-size: clamp(1.35rem, 3vw, 2rem);
      letter-spacing: -0.055em;
    }

    .section-title p {
      margin: 0;
      color: var(--muted);
      font-weight: 850;
    }

    .result-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .meta-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 13px;
      border-radius: 999px;
      border: 1px solid #dbe7f0;
      background: rgba(255, 255, 255, 0.78);
      color: #667085;
      font-weight: 900;
    }

    .category-panel {
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(230, 237, 244, 0.95);
      border-radius: var(--radius-xl);
      padding: 18px;
      box-shadow: 0 14px 36px rgba(17, 24, 39, 0.04);
    }

    .category-chips {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .chip {
      min-height: 74px;
      border: 1px solid #e2eaf2;
      background: #fff;
      color: #111827;
      border-radius: 22px;
      padding: 12px 13px;
      box-shadow: 0 9px 20px rgba(17, 24, 39, 0.04);
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .chip:hover {
      transform: translateY(-2px);
      border-color: #c7d8e6;
      box-shadow: 0 14px 28px rgba(17, 24, 39, 0.07);
    }

    .chip.is-active {
      background: linear-gradient(180deg, #f0fbfc, #ffffff);
      border-color: var(--primary);
      box-shadow: 0 16px 34px rgba(105, 190, 200, 0.18);
    }

    .chip-main {
      display: block;
      font-size: clamp(1.08rem, 2.3vw, 1.38rem);
      font-weight: 950;
      letter-spacing: -0.045em;
      color: #111827;
    }

    .chip-sub {
      display: block;
      margin-top: 3px;
      color: #6b7280;
      font-weight: 900;
    }

    .groups {
      margin-top: 22px;
      display: grid;
      gap: 22px;
    }

    .category-group {
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(230, 237, 244, 0.95);
      border-radius: var(--radius-xl);
      padding: 20px;
      box-shadow: 0 14px 36px rgba(17, 24, 39, 0.04);
    }

    .group-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e4ebf2;
    }

    .group-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0;
      font-size: clamp(1.17rem, 2.8vw, 1.6rem);
      letter-spacing: -0.055em;
    }

    .group-icon {
      display: inline-grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border-radius: 14px;
      background: var(--primary-soft);
      border: 1px solid #d2eff2;
      font-size: 1.35rem;
    }

    .group-count {
      color: #6b7280;
      font-weight: 900;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .product-card {
      position: relative;
      min-height: 232px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
      border: 1px solid #e0e9f1;
      background: #fff;
      border-radius: 26px;
      padding: 15px;
      text-align: left;
      box-shadow: var(--card-shadow);
      overflow: hidden;
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
    }

    .product-card::after {
      content: "";
      position: absolute;
      inset: auto 16px 0;
      height: 3px;
      border-radius: 999px 999px 0 0;
      background: linear-gradient(90deg, transparent, rgba(105, 190, 200, 0.8), transparent);
      opacity: 0;
      transition: opacity 180ms ease;
    }

    .product-card:hover {
      transform: translateY(-4px);
      border-color: #afd7de;
      box-shadow: 0 20px 40px rgba(17, 24, 39, 0.09);
    }

    .product-card:hover::after {
      opacity: 1;
    }

    .photo {
      position: relative;
      display: grid;
      place-items: center;
      height: 118px;
      border-radius: 22px;
      background:
        radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.75), transparent 28%),
        linear-gradient(135deg, rgba(105, 190, 200, 0.28), rgba(41, 70, 163, 0.09));
      border: 1px solid rgba(105, 190, 200, 0.28);
      overflow: hidden;
    }

    .photo::before {
      content: "";
      position: absolute;
      width: 84px;
      height: 84px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.38);
      right: -20px;
      bottom: -18px;
    }

    .photo span {
      position: relative;
      z-index: 1;
      font-size: 3.8rem;
      filter: drop-shadow(0 14px 18px rgba(17, 24, 39, 0.12));
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .card-text {
      min-width: 0;
    }

    .category-tag {
      display: inline-flex;
      width: fit-content;
      margin-bottom: 7px;
      padding: 5px 9px;
      border-radius: 999px;
      background: #f3f7fb;
      color: #667085;
      border: 1px solid #e4ebf2;
      font-weight: 900;
      font-size: 0.78rem;
    }

    .product-name {
      margin: 0;
      color: #111827;
      font-size: 1.13rem;
      line-height: 1.25;
      letter-spacing: -0.04em;
      font-weight: 950;
    }

    .product-desc {
      margin: 7px 0 0;
      color: #737d8c;
      line-height: 1.45;
      font-size: 0.91rem;
      font-weight: 700;
    }

    .score-badge {
      flex: 0 0 auto;
      min-width: 62px;
      display: grid;
      place-items: center;
      padding: 8px 9px;
      border-radius: 18px;
      background: #101828;
      color: white;
      box-shadow: 0 10px 22px rgba(16, 24, 40, 0.14);
    }

    .score-badge strong {
      line-height: 1;
      font-size: 1.08rem;
    }

    .score-badge small {
      margin-top: 3px;
      color: #cbd5e1;
      font-weight: 900;
      font-size: 0.72rem;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .small-tag {
      padding: 5px 8px;
      background: var(--primary-soft);
      color: #337d88;
      border: 1px solid #d3eef2;
      border-radius: 999px;
      font-weight: 900;
      font-size: 0.75rem;
    }

    .empty-state {
      padding: 42px 18px;
      border: 1px dashed #cbd8e4;
      background: rgba(255,255,255,0.7);
      border-radius: 26px;
      text-align: center;
      color: #667085;
      font-weight: 900;
    }

    .detail-page {
      display: none;
    }

    .detail-page.is-open {
      display: block;
    }

    .main-page.is-hidden {
      display: none;
    }

    .back-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 4px 0 18px;
    }

    .back-btn {
      border: 1px solid #dbe7f0;
      background: #ffffff;
      color: #101828;
      border-radius: 999px;
      padding: 12px 17px;
      font-weight: 950;
      box-shadow: 0 10px 22px rgba(17, 24, 39, 0.05);
      transition: transform 160ms ease, border-color 160ms ease;
    }

    .back-btn:hover {
      transform: translateY(-2px);
      border-color: var(--primary);
    }

    .detail-shell {
      display: grid;
      grid-template-columns: minmax(280px, 0.92fr) minmax(320px, 1.08fr);
      gap: 22px;
      align-items: start;
    }

    .detail-card {
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid #e3ebf2;
      border-radius: 34px;
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .detail-visual {
      text-align: center;
    }

    .detail-photo {
      height: 320px;
      border-radius: 30px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 28% 24%, rgba(255,255,255,0.85), transparent 25%),
        radial-gradient(circle at 80% 82%, rgba(105, 190, 200, 0.24), transparent 28%),
        linear-gradient(135deg, rgba(105, 190, 200, 0.24), rgba(41, 70, 163, 0.10));
      border: 1px solid rgba(105, 190, 200, 0.28);
      overflow: hidden;
    }

    .detail-photo span {
      font-size: 8.6rem;
      filter: drop-shadow(0 24px 26px rgba(17, 24, 39, 0.16));
    }

    .detail-title {
      margin: 20px 0 6px;
      font-size: clamp(1.7rem, 4vw, 2.7rem);
      line-height: 1.12;
      letter-spacing: -0.07em;
    }

    .detail-subtitle {
      margin: 0 auto 14px;
      color: #667085;
      font-weight: 850;
      line-height: 1.55;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 18px;
      text-align: left;
    }

    .info-item {
      padding: 14px;
      border: 1px solid #e4ebf2;
      background: #fff;
      border-radius: 18px;
    }

    .info-item span {
      display: block;
      color: #7a8597;
      font-weight: 900;
      font-size: 0.82rem;
      margin-bottom: 4px;
    }

    .info-item strong {
      color: #111827;
      font-weight: 950;
      letter-spacing: -0.03em;
    }

    .score-panel {
      display: grid;
      gap: 16px;
    }

    .panel-head {
      display: flex;
      gap: 14px;
      justify-content: space-between;
      align-items: flex-start;
      padding-bottom: 16px;
      border-bottom: 1px solid #e4ebf2;
    }

    .panel-head h2 {
      margin: 0;
      font-size: clamp(1.45rem, 3vw, 2.1rem);
      letter-spacing: -0.06em;
    }

    .panel-head p {
      margin: 7px 0 0;
      color: #667085;
      font-weight: 800;
      line-height: 1.5;
    }

    .total-score {
      flex: 0 0 auto;
      width: 132px;
      height: 132px;
      display: grid;
      place-items: center;
      border-radius: 34px;
      background: linear-gradient(180deg, #111827, #23314a);
      color: white;
      box-shadow: 0 24px 42px rgba(17, 24, 39, 0.18);
    }

    .total-score strong {
      display: block;
      text-align: center;
      font-size: 2.05rem;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .total-score span {
      display: block;
      margin-top: 7px;
      color: #cbd5e1;
      text-align: center;
      font-weight: 950;
    }

    .select-row {
      display: grid;
      gap: 10px;
      padding: 15px;
      border: 1px solid #e3ebf2;
      border-radius: 24px;
      background: #fff;
    }

    .select-row label {
      color: #667085;
      font-weight: 950;
    }

    .mode-select {
      width: 100%;
      min-height: 52px;
      border: 2px solid #dce8ef;
      border-radius: 17px;
      padding: 0 14px;
      color: #111827;
      background: #fff;
      outline: none;
      font-weight: 950;
    }

    .mode-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 5px rgba(105, 190, 200, 0.14);
    }

    .weight-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }

    .weight-pill {
      padding: 7px 10px;
      border-radius: 999px;
      color: #336f79;
      background: var(--primary-soft);
      border: 1px solid #cbeef2;
      font-weight: 950;
      font-size: 0.83rem;
    }

    .score-list {
      display: grid;
      gap: 10px;
    }

    .score-row {
      display: grid;
      grid-template-columns: 110px minmax(130px, 1fr) 56px;
      align-items: center;
      gap: 12px;
      padding: 14px;
      background: #fff;
      border: 1px solid #e4ebf2;
      border-radius: 20px;
    }

    .score-row-name {
      color: #111827;
      font-weight: 950;
      letter-spacing: -0.04em;
    }

    .star-line {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .star-box {
      position: relative;
      display: inline-block;
      font-size: 1.15rem;
      line-height: 1;
      letter-spacing: 0.07em;
      color: #d5dde7;
      white-space: nowrap;
    }

    .star-fill {
      position: absolute;
      inset: 0 auto 0 0;
      overflow: hidden;
      color: var(--yellow);
      white-space: nowrap;
    }

    .bar {
      height: 8px;
      flex: 1;
      min-width: 70px;
      background: #eef3f7;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--blue));
      border-radius: inherit;
    }

    .row-score {
      text-align: right;
      color: #111827;
      font-weight: 950;
    }

    .mode-note {
      padding: 15px;
      border-radius: 22px;
      background: #f7fbfd;
      border: 1px solid #e3ebf2;
      color: #657083;
      font-weight: 820;
      line-height: 1.55;
    }

    .footer-note {
      margin: 26px 4px 0;
      padding: 18px 20px;
      border: 1px solid #e1eaf2;
      background: rgba(255, 255, 255, 0.72);
      border-radius: 24px;
      color: #667085;
      font-weight: 820;
      line-height: 1.55;
    }

    .footer-note strong {
      color: #111827;
    }

    @media (max-width: 980px) {
      .category-chips {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .product-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .detail-shell {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 680px) {
      .app {
        padding: 14px 12px 42px;
      }

      .hero {
        border-radius: 26px;
        padding: 22px 14px 26px;
      }

      .search-field {
        height: 62px;
        border-radius: 18px;
      }

      .category-panel,
      .category-group,
      .detail-card {
        border-radius: 24px;
        padding: 15px;
      }

      .category-chips {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .chip {
        min-height: 66px;
        border-radius: 18px;
      }

      .product-grid {
        grid-template-columns: 1fr;
      }

      .panel-head {
        display: grid;
      }

      .total-score {
        width: 100%;
        height: auto;
        min-height: 108px;
        border-radius: 24px;
      }

      .detail-photo {
        height: 240px;
      }

      .detail-photo span {
        font-size: 6.5rem;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }

      .score-row {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .row-score {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="mainPage" class="main-page">
      <header class="hero">
        <div class="hero-inner">
          <svg class="mascot" viewBox="0 0 220 160" role="img" aria-label="상품을 안내하는 작은 마스코트">

    const categories = [...new Set(products.map(product => product.category))];
    let activeCategory = "전체";
    let activeMode = "health";

    const mainPage = document.getElementById("mainPage");
    const detailPage = document.getElementById("detailPage");
    const groupsEl = document.getElementById("groups");
    const searchInput = document.getElementById("searchInput");
    const resultCount = document.getElementById("resultCount");
    const activeFilter = document.getElementById("activeFilter");
    const categoryChips = document.getElementById("categoryChips");
    const mainModeButtons = document.getElementById("mainModeButtons");
    const detailContent = document.getElementById("detailContent");

    function weightedScore(product, modeKey = activeMode) {
      const mode = modes[modeKey];
      const raw = scoreKeys.reduce((sum, item) => sum + product.scores[item.key] * mode.weights[item.key], 0);
      return Math.round(raw * 100) / 100;
    }

    function starRating(score) {
      const width = Math.max(0, Math.min(100, (score / 5) * 100));
      return `
        <span class="star-box" aria-label="5점 만점 중 ${score.toFixed(1)}점">
          ★★★★★
          <span class="star-fill" style="width:${width}%">★★★★★</span>
        </span>
      `;
    }

    function modeWeightText(modeKey) {
      return scoreKeys.map(item => `${item.label} ${Math.round(modes[modeKey].weights[item.key] * 100)}%`).join(" · ");
    }

    function renderMainModes() {
      const buttons = Object.entries(modes).map(([key, mode]) => {
        return `<button class="mode-button ${key === activeMode ? "is-active" : ""}" type="button" data-mode="${key}">${mode.label}</button>`;
      }).join("");
      mainModeButtons.innerHTML = `<span class="mode-label">총점 기준</span>${buttons}`;

      mainModeButtons.querySelectorAll("[data-mode]").forEach(button => {
        button.addEventListener("click", () => {
          activeMode = button.dataset.mode;
          renderMainModes();
          renderProducts();
        });
      });
    }

    function renderCategoryChips() {
      const allCount = products.length;
      const allChip = `
        <button class="chip ${activeCategory === "전체" ? "is-active" : ""}" type="button" data-category="전체">
          <span class="chip-main">전체</span>
          <span class="chip-sub">${allCount}개</span>
        </button>
      `;

      const categoryHtml = categories.map(category => {
        const count = products.filter(product => product.category === category).length;
        const icon = categoryIcons[category] || "📦";
        return `
          <button class="chip ${activeCategory === category ? "is-active" : ""}" type="button" data-category="${category}">
            <span class="chip-main">${icon} ${category}</span>
            <span class="chip-sub">${count}개</span>
          </button>
        `;
      }).join("");

      categoryChips.innerHTML = allChip + categoryHtml;

      categoryChips.querySelectorAll("[data-category]").forEach(button => {
        button.addEventListener("click", () => {
          activeCategory = button.dataset.category;
          renderCategoryChips();
          renderProducts();
        });
      });
    }

    function productMatches(product, query) {
      const source = [
        product.name,
        product.category,
        product.brand,
        product.price,
        product.capacity,
        product.desc,
        ...(product.tags || [])
      ].join(" ").toLowerCase();

      return source.includes(query);
    }

    function getFilteredProducts() {
      const query = searchInput.value.trim().toLowerCase();
      return products.filter(product => {
        const categoryOk = activeCategory === "전체" || product.category === activeCategory;
        const searchOk = !query || productMatches(product, query);
        return categoryOk && searchOk;
      });
    }

    function renderProducts() {
      const filtered = getFilteredProducts();
      resultCount.textContent = `상품 ${filtered.length}개`;
      activeFilter.textContent = activeCategory === "전체" ? `${modes[activeMode].label} · 전체 보기` : `${modes[activeMode].label} · ${activeCategory}`;

      if (!filtered.length) {
        groupsEl.innerHTML = `
          <div class="empty-state">
            검색 결과가 없습니다. 검색어를 조금 덜 인간적으로 복잡하게 바꿔보세요.
          </div>
        `;
        return;
      }

      const grouped = categories
        .map(category => ({
          category,
          items: filtered.filter(product => product.category === category)
        }))
        .filter(group => group.items.length);

      groupsEl.innerHTML = grouped.map(group => `
        <article class="category-group">
          <div class="group-head">
            <h3 class="group-title"><span class="group-icon">${categoryIcons[group.category] || "📦"}</span>${group.category}</h3>
            <span class="group-count">${group.items.length}개 상품</span>
          </div>
          <div class="product-grid">
            ${group.items.map(product => renderCard(product)).join("")}
          </div>
        </article>
      `).join("");

      groupsEl.querySelectorAll("[data-product-id]").forEach(card => {
        card.addEventListener("click", () => {
          location.hash = `product=${card.dataset.productId}`;
        });
      });
    }

    function renderCard(product) {
      const score = weightedScore(product).toFixed(2);
      return `
        <button class="product-card" type="button" data-product-id="${product.id}" aria-label="${product.name} 상세 정보 보기">
          <div class="photo" aria-hidden="true">
            <span>${product.image}</span>
          </div>
          <div class="card-top">
            <div class="card-text">
              <span class="category-tag">${product.category}</span>
              <h3 class="product-name">${product.name}</h3>
              <p class="product-desc">${product.desc}</p>
              <div class="tag-row">
                ${product.tags.map(tag => `<span class="small-tag">${tag}</span>`).join("")}
              </div>
            </div>
            <span class="score-badge">
              <strong>${score}</strong>
              <small>/ 5</small>
            </span>
          </div>
        </button>
      `;
    }

    function showDetail(productId) {
      const product = products.find(item => item.id === productId);

      if (!product) {
        goHome();
        return;
      }

      mainPage.classList.add("is-hidden");
      detailPage.classList.add("is-open");

      const score = weightedScore(product).toFixed(2);
      const modeOptions = Object.entries(modes).map(([key, mode]) => {
        return `<option value="${key}" ${key === activeMode ? "selected" : ""}>${mode.label}</option>`;
      }).join("");

      detailContent.innerHTML = `
        <article class="detail-card detail-visual">
          <div class="detail-photo" aria-hidden="true">
            <span>${product.image}</span>
          </div>
          <h1 class="detail-title">${product.name}</h1>
          <p class="detail-subtitle">${product.desc}</p>
          <div class="tag-row" style="justify-content:center">
            ${product.tags.map(tag => `<span class="small-tag">${tag}</span>`).join("")}
          </div>
          <div class="info-grid">
            <div class="info-item"><span>브랜드</span><strong>${product.brand}</strong></div>
            <div class="info-item"><span>카테고리</span><strong>${product.category}</strong></div>
            <div class="info-item"><span>용량</span><strong>${product.capacity}</strong></div>
            <div class="info-item"><span>가격대</span><strong>${product.price}</strong></div>
          </div>
        </article>

        <article class="detail-card score-panel">
          <div class="panel-head">
            <div>
              <h2>소비 점수</h2>
              <p>${modes[activeMode].desc}</p>
            </div>
            <div class="total-score" aria-label="모드별 가중 총점 ${score}점">
              <div>
                <strong>${score}</strong>
                <span>/ 5 총점</span>
              </div>
            </div>
          </div>

          <div class="select-row">
            <label for="detailMode">소비 모드 선택</label>
            <select id="detailMode" class="mode-select">
              ${modeOptions}
            </select>
            <div class="weight-list">
              ${scoreKeys.map(item => `<span class="weight-pill">${item.label} ${Math.round(modes[activeMode].weights[item.key] * 100)}%</span>`).join("")}
            </div>
          </div>

          <div class="score-list">
            ${scoreKeys.map(item => {
              const value = product.scores[item.key];
              return `
                <div class="score-row">
                  <div class="score-row-name">${item.label}</div>
                  <div class="star-line">
                    ${starRating(value)}
                    <div class="bar" aria-hidden="true"><span style="width:${(value / 5) * 100}%"></span></div>
                  </div>
                  <div class="row-score">${value.toFixed(1)}</div>
                </div>
              `;
            }).join("")}
          </div>

          <div class="mode-note">
            현재 총점 계산식: ${modeWeightText(activeMode)}. 세부 점수는 모두 5점 만점이며, 모드별 가중치를 적용해 총점을 계산합니다.
          </div>
        </article>
      `;

      document.getElementById("detailMode").addEventListener("change", event => {
        activeMode = event.target.value;
        renderMainModes();
        showDetail(product.id);
      });

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function goHome() {
      if (location.hash) {
        history.pushState("", document.title, window.location.pathname + window.location.search);
      }
      detailPage.classList.remove("is-open");
      mainPage.classList.remove("is-hidden");
      renderMainModes();
      renderProducts();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function handleRoute() {
      const hash = decodeURIComponent(location.hash.replace("#", ""));
      if (hash.startsWith("product=")) {
        showDetail(hash.replace("product=", ""));
      } else {
        detailPage.classList.remove("is-open");
        mainPage.classList.remove("is-hidden");
      }
    }

    searchInput.addEventListener("input", renderProducts);
    window.addEventListener("hashchange", handleRoute);

    renderMainModes();
    renderCategoryChips();
    renderProducts();
    handleRoute();
  </script>
</body>
</html>
